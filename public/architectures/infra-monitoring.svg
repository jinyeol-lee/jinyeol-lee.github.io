<svg viewBox="0 0 1480 820" xmlns="http://www.w3.org/2000/svg" font-family="'Pretendard','Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6470"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2D9C6F"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#E8743B"/>
    </marker>
    <marker id="arrowMon" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7E57C2"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1c2733" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1480" height="820" fill="#FBFCFE"/>

  <!-- Title -->
  <text x="740" y="44" text-anchor="middle" font-size="27" font-weight="700" fill="#1c2733">스트리밍 복제 기반 IoT 데이터 · 모니터링 아키텍처</text>
  <text x="740" y="70" text-anchor="middle" font-size="13.5" fill="#7a8694">TimescaleDB Streaming Replication + Grafana Alloy / VictoriaMetrics Monitoring</text>

  <!-- Zone bands -->
  <rect x="24"   y="92" width="300" height="648" rx="16" fill="#EAF4FB" stroke="#B6D9F0" stroke-width="1.5"/>
  <rect x="344"  y="92" width="300" height="648" rx="16" fill="#F1ECFA" stroke="#CDBCEC" stroke-width="1.5"/>
  <rect x="664"  y="92" width="470" height="648" rx="16" fill="#EAF7EF" stroke="#BBE3CB" stroke-width="1.5"/>
  <rect x="1154" y="92" width="302" height="648" rx="16" fill="#FBF1E9" stroke="#F0D6BE" stroke-width="1.5"/>

  <!-- Zone titles -->
  <text x="174"  y="124" text-anchor="middle" font-size="15" font-weight="700" fill="#2E6B96">현장 · On-Premise / Edge</text>
  <text x="494"  y="124" text-anchor="middle" font-size="15" font-weight="700" fill="#6A4D9E">클라우드 · Cloud</text>
  <text x="899"  y="124" text-anchor="middle" font-size="15" font-weight="700" fill="#2C8C5A">사내 내부 서버 · On-Prem Internal</text>
  <text x="1305" y="124" text-anchor="middle" font-size="15" font-weight="700" fill="#B5722A">사용자 · User</text>

  <!-- ============ Zone 1: Field / Edge ============ -->
  <g filter="url(#shadow)"><rect x="46" y="176" width="126" height="96" rx="11" fill="#2E86C1"/></g>
  <g transform="translate(97,190)" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round">
    <circle cx="12" cy="19" r="2" fill="#fff" stroke="none"/>
    <path d="M6.5,15 a8,8 0 0 1 11,0"/>
    <path d="M3,11.5 a12.5,12.5 0 0 1 18,0"/>
  </g>
  <text x="109" y="242" text-anchor="middle" font-size="14.5" font-weight="700" fill="#fff">IoT 센서</text>
  <text x="109" y="261" text-anchor="middle" font-size="11" fill="#dcebf7">Sensors</text>

  <g filter="url(#shadow)"><rect x="192" y="176" width="110" height="96" rx="11" fill="#1F6FB0"/></g>
  <g transform="translate(235,190)" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round">
    <rect x="7" y="7" width="10" height="10" rx="1.5"/>
    <line x1="10" y1="3.5" x2="10" y2="7"/><line x1="14" y1="3.5" x2="14" y2="7"/>
    <line x1="10" y1="17" x2="10" y2="20.5"/><line x1="14" y1="17" x2="14" y2="20.5"/>
    <line x1="3.5" y1="10" x2="7" y2="10"/><line x1="3.5" y1="14" x2="7" y2="14"/>
    <line x1="17" y1="10" x2="20.5" y2="10"/><line x1="17" y1="14" x2="20.5" y2="14"/>
  </g>
  <text x="247" y="242" text-anchor="middle" font-size="14.5" font-weight="700" fill="#fff">PLC 장비</text>
  <text x="247" y="261" text-anchor="middle" font-size="11" fill="#dcebf7">Controllers</text>

  <!-- Protocol label -->
  <rect x="116" y="322" width="116" height="24" rx="12" fill="#ffffff" stroke="#9CC9E8" stroke-width="1.2"/>
  <text x="174" y="338" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2E6B96">RS-232 · 485 / LAN</text>

  <!-- Edge Server -->
  <g filter="url(#shadow)"><rect x="44" y="400" width="260" height="140" rx="12" fill="#117A8B"/></g>
  <g transform="translate(161,413)" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round">
    <rect x="3" y="4" width="20" height="7" rx="1.5"/>
    <rect x="3" y="14" width="20" height="7" rx="1.5"/>
    <circle cx="7" cy="7.5" r="1.1" fill="#fff" stroke="none"/>
    <circle cx="7" cy="17.5" r="1.1" fill="#fff" stroke="none"/>
  </g>
  <text x="174" y="460" text-anchor="middle" font-size="15.5" font-weight="700" fill="#fff">현장 엣지 서버</text>
  <text x="174" y="478" text-anchor="middle" font-size="10.5" fill="#d6eef1">Edge Server</text>
  <text x="174" y="496" text-anchor="middle" font-size="11" font-weight="600" fill="#bfe9ee">수집 · OPC UA 변환</text>
  <rect x="72" y="506" width="204" height="24" rx="7" fill="#7E57C2"/>
  <text x="174" y="522" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">◆ Grafana Alloy · Prometheus</text>

  <!-- ============ Zone 2: Cloud ============ -->
  <g filter="url(#shadow)"><rect x="364" y="336" width="260" height="148" rx="12" fill="#2D9C6F"/></g>
  <g transform="translate(382,350)" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round">
    <ellipse cx="10" cy="5" rx="7.5" ry="2.8"/>
    <path d="M2.5,5 v11 a7.5,2.8 0 0 0 15,0 v-11"/>
    <path d="M2.5,10.5 a7.5,2.8 0 0 0 15,0"/>
    <circle cx="16.5" cy="16.5" r="4" fill="#2D9C6F"/>
    <path d="M16.5,14.2 v2.3 l1.6,1.1"/>
  </g>
  <text x="414" y="366" font-size="15" font-weight="700" fill="#fff">TimescaleDB</text>
  <text x="414" y="383" font-size="11" fill="#d8f1e6">Primary · 클라우드 DB</text>
  <rect x="378" y="394" width="232" height="26" rx="7" fill="#ffffff" fill-opacity="0.16"/>
  <text x="494" y="411" text-anchor="middle" font-size="10.5" font-weight="600" fill="#fff">데이터 적재 · Write (Hypertable)</text>
  <rect x="378" y="450" width="232" height="24" rx="7" fill="#7E57C2"/>
  <text x="494" y="466" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">◆ Grafana Alloy · Prometheus</text>

  <!-- ============ Zone 3: On-Prem Internal ============ -->
  <!-- TimescaleDB Replica -->
  <g filter="url(#shadow)"><rect x="688" y="224" width="250" height="130" rx="12" fill="#3AA378"/></g>
  <g transform="translate(706,238)" stroke="#fff" stroke-width="1.6" fill="none" stroke-linecap="round">
    <ellipse cx="10" cy="5" rx="7.5" ry="2.8"/>
    <path d="M2.5,5 v11 a7.5,2.8 0 0 0 15,0 v-11"/>
    <path d="M2.5,10.5 a7.5,2.8 0 0 0 15,0"/>
  </g>
  <text x="738" y="254" font-size="15" font-weight="700" fill="#fff">TimescaleDB</text>
  <text x="738" y="271" font-size="11" fill="#e0f3ea">Replica · 복제본</text>
  <rect x="702" y="282" width="222" height="26" rx="7" fill="#ffffff" fill-opacity="0.18"/>
  <text x="813" y="299" text-anchor="middle" font-size="10.5" font-weight="600" fill="#fff">읽기 전용 · Read-only (Grafana)</text>
  <rect x="702" y="316" width="222" height="24" rx="7" fill="#ffffff" fill-opacity="0.18"/>
  <text x="813" y="332" text-anchor="middle" font-size="10" font-weight="600" fill="#fff">Streaming Replication 수신</text>

  <!-- VictoriaMetrics -->
  <g filter="url(#shadow)"><rect x="688" y="420" width="250" height="120" rx="12" fill="#7E57C2"/></g>
  <g transform="translate(706,436)" stroke="#fff" stroke-width="1.9" fill="none" stroke-linecap="round">
    <line x1="3" y1="20" x2="21" y2="20"/>
    <rect x="4" y="12" width="3.5" height="7" rx="1" fill="#fff" stroke="none"/>
    <rect x="10" y="6" width="3.5" height="13" rx="1" fill="#fff" stroke="none"/>
    <rect x="16" y="9" width="3.5" height="10" rx="1" fill="#fff" stroke="none"/>
  </g>
  <text x="738" y="452" font-size="15" font-weight="700" fill="#fff">VictoriaMetrics</text>
  <text x="738" y="471" font-size="11" fill="#e9e0f6">메트릭 저장 · Metrics TSDB</text>
  <rect x="702" y="484" width="222" height="26" rx="7" fill="#ffffff" fill-opacity="0.18"/>
  <text x="813" y="501" text-anchor="middle" font-size="10.5" font-weight="600" fill="#fff">Prometheus 호환 · 모니터링 저장소</text>

  <!-- Grafana -->
  <g filter="url(#shadow)"><rect x="970" y="300" width="140" height="160" rx="13" fill="#E8743B"/></g>
  <g transform="translate(1024,328)" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="3,21 3,3"/>
    <polyline points="3,21 23,21"/>
    <polyline points="6,16 11,10 15,13 22,5"/>
    <circle cx="11" cy="10" r="1.4" fill="#fff" stroke="none"/>
    <circle cx="15" cy="13" r="1.4" fill="#fff" stroke="none"/>
    <circle cx="22" cy="5" r="1.4" fill="#fff" stroke="none"/>
  </g>
  <text x="1040" y="388" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">Grafana</text>
  <text x="1040" y="410" text-anchor="middle" font-size="11" fill="#fce0d3">통합 대시보드</text>
  <text x="1040" y="427" text-anchor="middle" font-size="10" fill="#fad2bf">Dashboards</text>

  <!-- ============ Zone 4: User ============ -->
  <g filter="url(#shadow)"><rect x="1184" y="300" width="242" height="160" rx="13" fill="#5D6D7E"/></g>
  <g transform="translate(1293,326)" fill="#fff">
    <circle cx="12" cy="8" r="4.8"/>
    <path d="M3,22 a9,8.5 0 0 1 18,0 z"/>
  </g>
  <text x="1305" y="388" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">사용자</text>
  <text x="1305" y="410" text-anchor="middle" font-size="11.5" fill="#dfe4ea">Web Browser</text>
  <text x="1305" y="429" text-anchor="middle" font-size="11" fill="#cdd4dc">모니터링 · 분석</text>

  <!-- ============ Data-flow arrows ============ -->
  <path d="M109,272 C109,330 160,365 165,398" fill="none" stroke="#5b6470" stroke-width="2.2" marker-end="url(#arrow)"/>
  <path d="M247,272 C247,330 195,365 188,398" fill="none" stroke="#5b6470" stroke-width="2.2" marker-end="url(#arrow)"/>

  <!-- Edge -> Primary (write) -->
  <path d="M304,452 C334,448 336,414 362,408" fill="none" stroke="#5b6470" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="333" y="424" text-anchor="middle" font-size="10.5" font-weight="600" fill="#56606c">적재 write</text>

  <!-- Primary -> Replica (Streaming Replication) -->
  <path d="M624,400 C652,396 658,300 686,290" fill="none" stroke="#2D9C6F" stroke-width="2.6" marker-end="url(#arrowGreen)"/>
  <text x="655" y="372" text-anchor="middle" font-size="11" font-weight="700" fill="#2D9C6F">Streaming</text>
  <text x="655" y="386" text-anchor="middle" font-size="11" font-weight="700" fill="#2D9C6F">Replication</text>

  <!-- Replica -> Grafana (read) -->
  <path d="M938,289 C955,295 958,330 968,348" fill="none" stroke="#E8743B" stroke-width="2.2" marker-end="url(#arrowAccent)"/>
  <text x="952" y="312" text-anchor="middle" font-size="10.5" font-weight="600" fill="#c5612e">Read</text>

  <!-- VictoriaMetrics -> Grafana (metrics) -->
  <path d="M938,468 C956,463 960,420 968,406" fill="none" stroke="#E8743B" stroke-width="2.2" marker-end="url(#arrowAccent)"/>
  <text x="956" y="446" text-anchor="middle" font-size="10.5" font-weight="600" fill="#c5612e">Metrics</text>

  <!-- Grafana -> User -->
  <path d="M1110,375 C1150,375 1162,375 1182,375" fill="none" stroke="#5b6470" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="1147" y="367" text-anchor="middle" font-size="10.5" font-weight="600" fill="#56606c">대시보드 제공</text>

  <!-- ============ Monitoring arrows (dashed) ============ -->
  <!-- Edge Alloy -> VictoriaMetrics -->
  <path d="M276,520 C430,575 560,560 686,518" fill="none" stroke="#7E57C2" stroke-width="2.2" stroke-dasharray="7 4" marker-end="url(#arrowMon)"/>
  <text x="468" y="565" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6A4399">Prometheus metrics</text>

  <!-- Primary Alloy -> VictoriaMetrics -->
  <path d="M610,462 C645,470 656,478 686,488" fill="none" stroke="#7E57C2" stroke-width="2.2" stroke-dasharray="7 4" marker-end="url(#arrowMon)"/>
  <text x="650" y="458" text-anchor="middle" font-size="10.5" font-weight="600" fill="#6A4399">metrics</text>

  <!-- ============ Legend ============ -->
  <line x1="430" y1="772" x2="470" y2="772" stroke="#5b6470" stroke-width="2.4" marker-end="url(#arrow)"/>
  <text x="478" y="776" font-size="11.5" fill="#56606c">데이터 흐름 · Data flow</text>
  <line x1="650" y1="772" x2="690" y2="772" stroke="#2D9C6F" stroke-width="2.6" marker-end="url(#arrowGreen)"/>
  <text x="698" y="776" font-size="11.5" fill="#2D9C6F">Streaming Replication</text>
  <line x1="888" y1="772" x2="928" y2="772" stroke="#7E57C2" stroke-width="2.2" stroke-dasharray="7 4" marker-end="url(#arrowMon)"/>
  <text x="936" y="776" font-size="11.5" fill="#6A4399">모니터링 (Prometheus) · Monitoring</text>
</svg>
